name: DataOps CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  pyspark-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java (Required for Spark)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyspark==3.5.0 chispa pytest delta-spark==3.2.0

    - name: Run PySpark Unit Tests with Chispa
      env:
        # Define variáveis para o Spark rodar de forma leve no container do GitHub
        SPARK_LOCAL_IP: "127.0.0.1"
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest src/tests/ -v